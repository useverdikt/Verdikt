# Deploy the API from the monorepo root so `shared/` is on disk at runtime.
# In Railway: set this repo as connected; leave "Root Directory" empty or "." so this file applies.
# If you instead set Root Directory to `backend/` only, `postinstall` copies `../shared` into `backend/shared/`.

[build]
builder = "nixpacks"
buildCommand = "npm ci --prefix backend"

[deploy]
startCommand = "npm start --prefix backend"
restartPolicyType = "on_failure"
