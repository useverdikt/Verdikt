# Railway service rootDirectory is `backend/`, so commands run from backend already.
# Do not use `--prefix backend` here or npm will look for `backend/backend/`.

[build]
builder = "nixpacks"
# Dependencies are installed in the Nixpacks install phase already.
# Running npm ci again in build can fail with EBUSY on /app/node_modules/.cache.
buildCommand = "echo 'No build step (Node backend)'"

[deploy]
startCommand = "npm start"
restartPolicyType = "on_failure"
