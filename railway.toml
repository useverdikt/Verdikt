# Railway deploys from the repository root (npm workspaces).
# In the Railway service settings, set Root Directory to `.` (repo root), NOT `backend/`.
# Backend depends on @useverdikt/shared at ../shared; an isolated backend/ root breaks `npm ci`.

[build]
builder = "nixpacks"
buildCommand = "echo 'No build step (Node backend via workspace)'"

[deploy]
startCommand = "npm run start:backend"
restartPolicyType = "on_failure"
