# Publish @useverdikt/mcp to npm (manual or on version tag).
# Requires repository secret NPM_TOKEN (npm access token with publish rights for @useverdikt).

name: Publish MCP

on:
  workflow_dispatch:
  push:
    tags:
      - "mcp-v*"

jobs:
  publish:
    name: Publish @useverdikt/mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
