# Example: post CI signals to Verdikt after tests/evals on a PR.
# Copy to your app repo (e.g. .github/workflows/verdikt-ci.yml) and set secrets:
#   VERDIKT_WEBHOOK_SECRET  — HMAC secret for x-verdikt-signature
#   VERDIKT_WORKSPACE_ID    — ws_… from Verdikt dashboard
#
# Optional repo variable:
#   VERDIKT_API_URL         — default https://api.useverdikt.com
#
# Signals attach to the cert window for this commit_sha (same as verdikt:rc label / create_release).

name: Verdikt CI signals (example)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  post-verdikt-signals:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Post signals to Verdikt
        env:
          VERDIKT_API_URL: ${{ vars.VERDIKT_API_URL || 'https://api.useverdikt.com' }}
          VERDIKT_WS: ${{ secrets.VERDIKT_WORKSPACE_ID }}
          VERDIKT_WEBHOOK_SECRET: ${{ secrets.VERDIKT_WEBHOOK_SECRET }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          # Replace with real metrics from your test/eval steps (jq, artifacts, etc.)
          BODY=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --argjson pr "$PR_NUMBER" \
            --arg owner "$REPO_OWNER" \
            --arg repo "$REPO_NAME" \
            '{
              commit_sha: $sha,
              pr_number: $pr,
              repo_owner: $owner,
              repo_name: $repo,
              source: "github_actions",
              signals: {
                accuracy: 92,
                safety: 91,
                tone: 88,
                hallucination: 95,
                relevance: 90,
                smoke: 100,
                e2e_regression: 100
              }
            }')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$VERDIKT_WEBHOOK_SECRET" | awk '{print $2}')"
          curl -sfS -X POST "$VERDIKT_API_URL/api/workspaces/$VERDIKT_WS/integrations/ci" \
            -H "Content-Type: application/json" \
            -H "x-verdikt-signature: $SIG" \
            -d "$BODY"
