# Dogfood: block merge on PRs labeled verdikt:rc until Verdikt certifies the head commit.
#
# Required repo secrets (Settings → Secrets → Actions):
#   VERDIKT_API_URL          — https://api.useverdikt.com
#   VERDIKT_API_KEY          — workspace API key (Settings → Agent access)
#   VERDIKT_WORKSPACE_ID     — e.g. ws_…
#
# Also required outside GitHub:
#   - Verdikt GitHub App on this repo + verdikt:rc label trigger
#   - Branch protection: require check "Verdikt gate / verdikt-gate"
#
# Polls the gate (12 × 10s) so integration auto-pull can finish before failing the check.
# After the gate poll, captures GET /api/releases/:id/release-brief as a workflow artifact.
# See docs/DOGFOOD_RUNBOOK.md

name: Verdikt gate

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: verdikt-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verdikt-gate:
    if: contains(github.event.pull_request.labels.*.name, 'verdikt:rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Wait for Verdikt gate
        id: gate
        env:
          VERDIKT_API_URL: ${{ secrets.VERDIKT_API_URL }}
          VERDIKT_API_KEY: ${{ secrets.VERDIKT_API_KEY }}
          VERDIKT_WORKSPACE_ID: ${{ secrets.VERDIKT_WORKSPACE_ID }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          POLL_ATTEMPTS: "12"
          POLL_INTERVAL_SEC: "10"
        run: |
          set -euo pipefail
          if [ -z "${VERDIKT_API_KEY:-}" ] || [ -z "${VERDIKT_WORKSPACE_ID:-}" ]; then
            echo "::error::Set VERDIKT_API_KEY and VERDIKT_WORKSPACE_ID repo secrets"
            exit 1
          fi
          BASE="${VERDIKT_API_URL:-https://api.useverdikt.com}"
          URL="${BASE%/}/api/workspaces/${VERDIKT_WORKSPACE_ID}/gate"
          QUERY="commit_sha=${COMMIT_SHA}&pr_number=${PR_NUMBER}&github_owner=${REPO_OWNER}&github_repo=${REPO_NAME}&mode=default"
          echo "Polling ${URL}?${QUERY}"

          write_gate_response() {
            if [ -n "${LAST_RESP:-}" ]; then
              echo "$LAST_RESP" > gate-response.json
            fi
          }

          LAST_RESP=""
          for attempt in $(seq 1 "${POLL_ATTEMPTS}"); do
            echo "--- Gate poll ${attempt}/${POLL_ATTEMPTS} ---"
            LAST_RESP=$(curl -sS -f -H "Authorization: Bearer ${VERDIKT_API_KEY}" "${URL}?${QUERY}")
            ACTION=$(echo "$LAST_RESP" | jq -r '.action // "unknown"')
            STATUS=$(echo "$LAST_RESP" | jq -r '.status // "unknown"')
            REASON=$(echo "$LAST_RESP" | jq -r '.gate.reason // ""')
            echo "Verdikt: action=${ACTION} status=${STATUS} — ${REASON}"

            if [ "$ACTION" = "merge" ]; then
              echo "$LAST_RESP" | jq .
              write_gate_response
              echo "Verdikt gate passed."
              exit 0
            fi

            if [ "$ACTION" = "escalate" ]; then
              echo "$LAST_RESP" | jq .
              echo "$LAST_RESP" | jq -r '.blockers[]? | "- [\(.type)] \(.signal_id // .code // "release"): \(.message // .next_step // "")"' || true
              NEXT_STEP=$(echo "$LAST_RESP" | jq -r '.next_step // empty')
              [ -n "$NEXT_STEP" ] && echo "Next step: ${NEXT_STEP}"
              write_gate_response
              echo "::error::Verdikt gate escalated — human override required."
              exit 1
            fi

            if [ "$attempt" -lt "${POLL_ATTEMPTS}" ] && { [ "$ACTION" = "collecting" ] || [ "$ACTION" = "self_heal" ]; }; then
              echo "Waiting for signals (action=${ACTION}) — sleeping ${POLL_INTERVAL_SEC}s..."
              sleep "${POLL_INTERVAL_SEC}"
              continue
            fi

            break
          done

          echo "$LAST_RESP" | jq .
          echo "$LAST_RESP" | jq -r '.blockers[]? | "- [\(.type)] \(.signal_id // .code // "release"): \(.message // .next_step // "")"' || true
          NEXT_STEP=$(echo "$LAST_RESP" | jq -r '.next_step // empty')
          [ -n "$NEXT_STEP" ] && echo "Next step: ${NEXT_STEP}"
          ACTION=$(echo "$LAST_RESP" | jq -r '.action // "unknown"')
          STATUS=$(echo "$LAST_RESP" | jq -r '.status // "unknown"')
          write_gate_response
          if [ "$STATUS" = "COLLECTING" ]; then
            echo "::error::Verdikt gate timed out waiting for signals. Check integration wiring and SHA tagging on your eval runs."
          elif [ "$STATUS" = "UNCERTIFIED" ]; then
            echo "::error::Verdikt gate timed out — signals arrived but did not pass thresholds. Review blocking signals above."
          else
            echo "::error::Verdikt gate did not pass within timeout (last action=${ACTION}, status=${STATUS})."
          fi
          exit 1

      - name: Capture release brief
        if: always()
        continue-on-error: true
        env:
          VERDIKT_API_URL: ${{ secrets.VERDIKT_API_URL }}
          VERDIKT_API_KEY: ${{ secrets.VERDIKT_API_KEY }}
        run: |
          set -euo pipefail
          if [ ! -f gate-response.json ]; then
            echo "No gate-response.json — skipping brief capture"
            exit 0
          fi

          RELEASE_ID=$(jq -r '.release_id // empty' gate-response.json)
          if [ -z "$RELEASE_ID" ]; then
            echo "No release_id in gate response — skipping brief capture"
            exit 0
          fi

          BASE="${VERDIKT_API_URL:-https://api.useverdikt.com}"
          curl -sSf \
            -H "Authorization: Bearer ${VERDIKT_API_KEY}" \
            "${BASE%/}/api/releases/${RELEASE_ID}/release-brief" \
            | jq . > release-brief.json

          echo "=== Release Brief ==="
          jq '{
            release_id,
            status,
            gate_action,
            suggested_verb,
            verdict: .verdict,
            top_blockers,
            regression_story: .regression_story.summary,
            hub_links
          }' release-brief.json

      - name: Upload release brief artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: release-brief-${{ github.event.pull_request.head.sha }}
          path: release-brief.json
          retention-days: 90
          if-no-files-found: ignore
