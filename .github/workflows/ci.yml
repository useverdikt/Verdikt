# Backend unit tests, frontend Vitest, and Playwright E2E (Chromium).
# Requires package-lock.json in backend/ and frontend/ for npm ci.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend (node:test)
    runs-on: ubuntu-latest
    services:
      postgres:
        # Docker Hub pulls often timeout on GHA; ECR Public mirrors official postgres image.
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verdikt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d verdikt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/verdikt_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/verdikt_test
      GEMINI_API_KEY: unit-test-stub-gemini-key-not-for-production-use
      GEMINI_LIVE_TEST: "0"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-unit:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  mcp-package:
    name: MCP package (@useverdikt/mcp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run

  frontend-e2e:
    name: Frontend (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        # Docker Hub pulls often timeout on GHA; ECR Public mirrors official postgres image.
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verdikt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d verdikt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: frontend
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/verdikt_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/verdikt_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Verify PostgreSQL connectivity for backend
        working-directory: backend
        run: |
          node -e "const { Client } = require('pg'); (async () => { const c = new Client({ connectionString: process.env.DATABASE_URL }); await c.connect(); const r = await c.query('select 1 as ok'); console.log('postgres ok:', r.rows[0].ok); await c.end(); })().catch((e) => { console.error(e); process.exit(1); });"
      - name: Install Playwright Chromium (system deps + browser)
        run: npx playwright install chromium --with-deps
      - name: Run E2E
        env:
          DEBUG: pw:webserver
        run: npm run test:e2e
